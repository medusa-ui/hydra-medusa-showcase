version: 2

updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: daily
    ignore:
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]   
    open-pull-requests-limit: 25
    
  - package-ecosystem: "maven"
    directory: "/tests"
    schedule:
      interval: daily
    ignore:
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]  
    open-pull-requests-limit: 25
